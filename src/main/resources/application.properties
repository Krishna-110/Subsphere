spring.application.name=subsphere
server.port=8080

# Database Connection Settings (PostgreSQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL92Dialect

rdbc.driver=org.postgresql.Driver

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-secret}
spring.security.oauth2.client.registration.google.scope=profile, email

# Redirect URL for after successful login
app.frontend.redirect-url=${APP_REDIRACT_URL:http://localhost:8081/dashboard}

# Stripe Payment Configuration
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# Redis Cache Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REIDIS_PORT:6379}
spring.cache.type=redis

# Google Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}

logging.level.org.springframework.security=TRACE

# JWT Authentication
jwt.secret=${JWT_SECRET:8a42f6d5e7b233a1f94dca7c6f13bc89a6b12f45c9182390b49fcd0fa4bb79d}
jwt.expiration=86400000
