spring.application.name=subsphere
server.port=8080

# Database Connection Settings (PostgreSQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Auto-create db schema, hide sql
# Hibernate 7+ auto-detects dialect and version, dont hardcode
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-secret}
spring.security.oauth2.client.registration.google.scope=profile, email

# Redirect URL for after successful login
app.frontend.redirect-url=${APP_REDIRECT_URL:http://localhost:8081/dashboard}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://192.168.29.245:8081,http://192.168.29.245.nip.io:8081,http://192.168.29.245:19000}

# Stripe Payment Configuration
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# Cache (disabled on free tier - no Redis)
spring.cache.type=none

# Google Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}

logging.level.org.springframework.security=TRACE

# JWT Authentication
jwt.secret=${JWT_SECRET:8a42f6d5e7b233a1f94dca7c6f13bc89a6b12f45c9182390b49fcd0fa4bb79d}
jwt.expiration=86400000
