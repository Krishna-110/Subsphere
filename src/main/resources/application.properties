spring.application.name=subsphere
server.port=8080

# Database Connection Settings
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/saas_platform_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-secret}
spring.security.oauth2.client.registration.google.scope=profile, email

# Redirect URL for after successful login (set to Expo for mobile dev)
app.frontend.redirect-url=${APP_REDIRECT_URL:exp://192.168.29.245.nip.io:8081/--/dashboard}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://192.168.29.245:8081,http://192.168.29.245.nip.io:8081,http://192.168.29.245:19000}

# Stripe Payment Configuration
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# Redis Cache Configuration (Upstash)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=true
spring.cache.type=redis

# Google Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}

logging.level.org.springframework.security=TRACE

# JWT Authentication
jwt.secret=${JWT_SECRET:8a42f6d5e7b233a1f94dca7c6f13bc89a6b12f45c9182390b49fcd0fa4bb79d}
jwt.expiration=86400000