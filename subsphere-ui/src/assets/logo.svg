<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad1)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6" />
  
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#grad2)" stroke-width="0.5" opacity="0.4" />

  <polygon points="50,18 77.7,34 77.7,66 50,82 22.3,66 22.3,34" fill="none" stroke="url(#grad2)" stroke-width="3" filter="url(#glow)" />

  <line x1="22.3" y1="34" x2="77.7" y2="66" stroke="url(#grad1)" stroke-width="1.5" opacity="0.8" />
  <line x1="22.3" y1="66" x2="77.7" y2="34" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8" />
  <line x1="50" y1="18" x2="50" y2="82" stroke="url(#grad1)" stroke-width="1.5" opacity="0.8" />

  <circle cx="50" cy="50" r="5" fill="#ffffff" filter="url(#glow)" />
  <circle cx="50" cy="50" r="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5" />
</svg>
